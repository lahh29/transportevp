    <path d="M 140 160 L 256 360 L 372 160 L 310 160 L 256 250 L 202 160 Z" fill="url(#gradient)" />
    <!-- Center stripe -->
    <path d="M 246 290 L 266 290 L 262 315 L 250 315 Z" fill="#26251E" />
    <path d="M 240 330 L 272 330 L 266 360 L 246 360 Z" fill="#26251E" />

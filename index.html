<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <!--
            Items 3 + accesibilidad: permitimos zoom (WCAG 1.4.4) y
            usamos viewport-fit=cover para que la PWA en iPhone con notch
            pueda dibujar bajo el área segura (manejado con env(safe-area-inset-*)).
        -->
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, viewport-fit=cover"
        />
        <meta name="theme-color" content="#26251E" media="(prefers-color-scheme: dark)" />
        <meta name="theme-color" content="#f7f7f4" media="(prefers-color-scheme: light)" />
        <meta name="color-scheme" content="light dark" />
        <meta name="description" content="Portal de abordaje QR para transporte empresarial ViñoPlastic." />

        <!-- PWA iOS (item 2) -->
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
        <meta name="apple-mobile-web-app-title" content="ViñoPlastic" />
        <meta name="mobile-web-app-capable" content="yes" />
        <meta name="format-detection" content="telephone=no" />

        <!-- Íconos (los PNG son generados por vite-pwa al build; fallback al SVG en dev) -->
        <link rel="icon" type="image/svg+xml" href="/logo.svg" />
        <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" />
        <link rel="mask-icon" href="/logo.svg" color="#26251E" />

        <title>ViñoPlastic · Portal de Transporte</title>
    </head>
    <body>
        <div id="root"></div>
        <script type="module" src="/src/main.jsx"></script>
    </body>
</html>
